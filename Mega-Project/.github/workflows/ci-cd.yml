name: Mega-Lab Project
on:
 push:
  branches:
   - main
jobs:
  build:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Deploy
       uses: appleboy/ssh-action@v0.1.9
       with: 
        host: ${{ secrets.AZURE_VM_IP }}
        username: ${{ secrets.AZURE_VM_USER }}
        password: ${{ secrets.AZURE_VM_PASSWORD }} # or use key
        port: 22
        script: |
          sudo cp $GITHUB_WORKSPACE/index.html /usr/share/nginx/html/index.html
          sudo systemctl restart nginx  